<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>对外汉语教学神器 - 笔画部件 & 词组字帖版 v47.1</title>
    <!-- 引入 Hanzi Writer -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <!-- 引入 pinyin-pro 用于获取拼音 -->
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #FF8C42; --secondary: #3F8EFC; --bg: #f4f7f9; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 30px; margin: 0; }
        
        .header-title { font-size: 24px; color: #333; margin-bottom: 20px; font-weight: bold; }
        
        /* 顶部控制栏 */
        .no-print { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        /* 修改：输入框宽度增加以支持词语 */
        input { padding: 12px; width: 260px; border-radius: 12px; border: 2px solid #ddd; text-align: center; font-size: 22px; outline: none; transition: border-color 0.3s;}
        input:focus { border-color: var(--secondary); }
        
        button, .btn-link { 
            padding: 10px 15px; border: none; border-radius: 12px; cursor: pointer; color: white; 
            font-weight: bold; transition: all 0.2s; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none; display: inline-block; text-align: center; font-family: inherit;
        }
        .btn-gen { background: var(--secondary); font-size: 15px; padding: 12px 20px;}
        .btn-hanzipi { background: #27ae60; font-size: 15px; padding: 12px 20px; } 
        .btn-dl-main { background: #FF8C42; } 
        .btn-dl-outline { background: #1abc9c; }
        .btn-dl-strokes { background: #9b59b6; }
        .btn-dl-comp { background: #e74c3c; } 
        .btn-dl-worksheet { background: #2c3e50; }
        
        /* 【新增代码位置】句子导出的按钮样式 */
        .btn-sentence { background: #16a085; }

        button span, .btn-link span { display: block; font-size: 11px; font-weight: normal; opacity: 0.9; margin-top: 2px;}
        button:hover, .btn-link:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2);}
        
        /* 预览卡片区 */
        .canvas-area { display: flex; flex-direction: column; gap: 30px; justify-content: center; width: 100%; max-width: 1200px;}
        /* 新增：词语展示容器 */
        .word-row-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; min-width: 280px; position: relative;}
        
        /* 页面拼音/翻译显示样式 */
        .pinyin-display { font-size: 24px; font-weight: bold; color: #FF8C42; margin-bottom: 2px; min-height: 30px; }
        .meaning-display { font-size: 14px; color: #666; margin-bottom: 10px; font-style: italic; min-height: 20px; }

        .grid-container { position: relative; width: 240px; height: 240px; border: 2px solid #333; background: white; overflow: hidden; border-radius: 8px;}
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .label { text-align: center; margin-top: 15px; font-weight: bold; color: #555; font-size: 14px; }

        .stroke-number { font-family: Arial; font-size: 80px; font-weight: 900; fill: #000; paint-order: stroke; stroke: #fff; stroke-width: 14px; }

        /* 部件显示区 */
        .components-panel { width: 100%; max-width: 1100px; background: white; padding: 20px; border-radius: 24px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .comp-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .comp-group:last-child { border-bottom: none; }
        .comp-group-title { font-size: 14px; font-weight: bold; color: #3F8EFC; margin-bottom: 8px; }
        .comp-display { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;}
        .comp-item { width: 150px; height: 150px; border: 2px dashed #ddd; border-radius: 12px; position: relative; background: #fafafa; flex-shrink: 0;}

        /* 字帖区 */
        .worksheet-panel { width: 100%; max-width: 1100px; background: white; padding: 30px; border-radius: 24px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .worksheet-row-wrapper { overflow-x: auto; margin-top: 15px; padding-bottom: 10px; }
        .worksheet-row { display: flex; flex-wrap: nowrap; gap: 2px; background: #333; padding: 2px; width: fit-content; margin-bottom: 5px; }
        /* 【新增代码位置】句子书写格子的样式封装 */
        .sentence-cell-box { display: flex; flex-direction: column; align-items: center; background: white; flex-shrink: 0; }
        .sentence-pinyin { height: 25px; font-size: 12px; color: #FF8C42; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .worksheet-cell { width: 85px; height: 85px; position: relative; background: white; flex-shrink: 0; }
        
        .row-label { font-size: 14px; color: #666; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px;}
        .row-label i { font-style: normal; background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 12px;}

        /* 弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal h3 { margin-top: 0; color: #333; }
        .modal p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; }
        .modal-btns button { width: 100%; padding: 12px; }

        /* 笔顺模式切换 */
        .stroke-mode-toggle { display: flex; align-items: center; gap: 8px; background: #f0f0f0; border-radius: 14px; padding: 4px; }
        .stroke-mode-btn { padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; background: transparent; color: #888; transition: all 0.25s; box-shadow: none; }
        .stroke-mode-btn.active { background: white; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .stroke-mode-btn:hover { opacity: 1; transform: none; box-shadow: none; }
        .stroke-mode-btn.active:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.18); }

        @media print {
            .no-print, .header-title, .canvas-area, .components-panel, .modal-overlay { display: none !important; }
            .worksheet-panel { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="header-title">👨‍🏫 中文课堂：汉字/词组综合教学工具 (v47.1)</div>

<div class="no-print">
    <!-- 修改：不再限制字数长度 -->
    <input type="text" id="charInput" value="你好">
    <button class="btn-gen" onclick="initAll()">生成并演示<br><span>Generate & Play</span></button>
    <a href="https://www.hanzipi.com" target="_blank" class="btn-link btn-hanzipi">参考汉字皮<br><span>HanziPi.com</span></a>
    
    <div style="width: 2px; height: 40px; background: #eee; margin: 0 5px;"></div>
    
    <button class="btn-dl-main" onclick="showDownloadOptions('main')">🖼️ 下载彩虹图<span>Pinyin & Translation</span></button>
    <button class="btn-dl-outline" onclick="showDownloadOptions('outline')">🎨 下载空心字<span>Pinyin & Translation</span></button>
    <button class="btn-dl-strokes" onclick="downloadAllStrokes()">🌈 下载彩色笔画<span>Transparent PNG</span></button>
    <button class="btn-dl-comp" onclick="downloadComponents()">🧩 下载汉字部件<span>Transparent PNG</span></button>
    <button class="btn-dl-worksheet" onclick="downloadWorksheet()">📥 下载双行字帖<span>Download Sheet</span></button>
    <!-- 【新增代码位置】句子导出的按钮 -->
    <button class="btn-sentence" onclick="downloadSentenceWorksheet()">📝 导出句子练习纸<span>Sentence Practice</span></button>
</div>

<div class="modal-overlay" id="downloadModal">
    <div class="modal">
        <h3>下载选项 / Export</h3>
        <p>请选择图片上方包含的信息：<br>Select header info to include:</p>
        <div class="modal-btns">
            <button class="btn-dl-main" onclick="executeDownload('full')">带调拼音 + 英文翻译 (Pinyin & English)</button>
            <button class="btn-dl-outline" onclick="executeDownload('pinyin')">仅带调拼音 (Standard Pinyin Only)</button>
            <button class="btn-dl-worksheet" onclick="executeDownload('english')">仅英文/无调 (English Only)</button>
            <button style="background:#ddd; color:#333;" onclick="executeDownload('none')">不带标注 (No Annotation)</button>
            <button style="background:#eee; color:#666;" onclick="closeModal()">取消 (Cancel)</button>
        </div>
    </div>
</div>

<div class="canvas-area" id="canvasArea">
    <!-- 动态生成多字展示区域 -->
</div>

<div class="components-panel">
    <div class="row-label">🧩 汉字部件拆解 (Radical / Components)</div>
    <div id="compDisplayRoot"></div>
</div>

<div class="worksheet-panel" id="worksheetArea">
    <div class="row-label" style="justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <span>📖 综合字帖行 (Comprehensive Practice Sheets)</span>
        <div class="stroke-mode-toggle no-print">
            <button class="stroke-mode-btn active" id="btnModeRainbow" onclick="setStrokeMode('rainbow')">🌈 彩虹笔画</button>
            <button class="stroke-mode-btn" id="btnModeComponent" onclick="setStrokeMode('component')">🧩 部件着色</button>
        </div>
    </div>
    <!-- 动态生成练习行 -->
    <div id="worksheetRowsRoot"></div>
    
    <!-- 【新增代码位置】专门展示句子字帖预览的容器 -->
    <div id="sentenceWorksheetRoot" style="margin-top: 30px;"></div>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>
<canvas id="sheetCanvas" style="display:none;"></canvas>

<script>
    const apiKey = ""; 
    let writers = []; // 修改：支持多字动画实例
    let charDataArray = []; // 修改：存储整个词组的数据
    let currentMeaning = "";
    let isLooping = false;
    let currentDownloadType = ''; 
    
    const COLORS = ['#E74C3C', '#E67E22', '#F1C40F', '#2ECC71', '#3498DB', '#9B59B6', '#1ABC9C', '#FF6B81', '#45AAF2', '#20BF6B', '#FA8231'];
    const COMPONENT_COLORS = ['#E74C3C','#3498DB','#27AE60','#8E44AD','#F39C12','#16A085','#C0392B','#2980B9','#D35400','#1ABC9C'];
    const TRANSFORM = "scale(0.8, -0.8) translate(128, -980)";
    let currentStrokeMode = 'rainbow'; 
    let currentAnimMode = 'rainbow';   

    // 修改：支持翻译词组
    async function getTranslation(text) {
        const prompt = `Translate the Chinese word or sentence "${text}" to a concise 1-3 word English definition. Return only the English word(s).`;
        const systemPrompt = "You are a helpful dictionary. Provide only the concise translation.";
        let retries = 0;
        const maxRetries = 5;
        while (retries < maxRetries) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const result = await response.json();
                const resText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                return resText ? resText.trim() : "Definition N/A";
            } catch (e) {
                retries++;
                const delay = Math.pow(2, retries) * 500;
                await new Promise(res => setTimeout(res, delay));
            }
        }
        return "Error fetching";
    }

    // 修改：核心初始化函数，支持多字
    async function initAll() {
        isLooping = false;
        writers = [];
        charDataArray = [];
        const inputText = document.getElementById('charInput').value || '美';
        const chars = Array.from(inputText).filter(c => /\p{Unified_Ideograph}/u.test(c)); // 过滤出汉字
        
        if(chars.length === 0) return;

        // 清理旧内容
        document.getElementById('canvasArea').innerHTML = '';
        document.getElementById('compDisplayRoot').innerHTML = '';
        document.getElementById('worksheetRowsRoot').innerHTML = '';
        document.getElementById('sentenceWorksheetRoot').innerHTML = ''; // 【新增】清理句子区

        // 全局拼音与翻译
        const fullPinyin = pinyinPro.pinyin(inputText);
        getTranslation(inputText).then(meaning => {
            currentMeaning = meaning;
        });

        // 1. 创建三行展示区（彩虹图、动画、空心）
        const labels = ['彩虹笔顺图', '循环动画', '空心轮廓'];
        labels.forEach((label, groupIdx) => {
            const section = document.createElement('div');
            section.innerHTML = `<div class="row-label" style="justify-content:center; font-size:18px; margin-top:10px;">${label}</div>`;
            const rowContainer = document.createElement('div');
            rowContainer.className = 'word-row-container';
            
            chars.forEach((char, charIdx) => {
                const card = document.createElement('div');
                card.className = 'card';
                const pinyin = pinyinPro.pinyin(char);
                const targetId = `target_${groupIdx}_${charIdx}`;
                
                card.innerHTML = `
                    <div class="pinyin-display">${pinyin}</div>
                    <div class="meaning-display" id="meaning_${groupIdx}_${charIdx}">...</div>
                    <div id="${targetId}" class="grid-container"></div>
                `;
                
                if (groupIdx === 1 && charIdx === 0) { // 仅在动画组的第一个卡片显示切换按钮
                    const toggle = document.createElement('div');
                    toggle.className = 'stroke-mode-toggle no-print';
                    toggle.style.marginTop = '10px';
                    toggle.innerHTML = `
                        <button class="stroke-mode-btn active" id="btnAnimRainbow" onclick="setAnimMode('rainbow')">🌈 彩虹</button>
                        <button class="stroke-mode-btn" id="btnAnimComponent" onclick="setAnimMode('component')">🧩 部件</button>
                    `;
                    card.appendChild(toggle);
                }

                rowContainer.appendChild(card);
            });
            section.appendChild(rowContainer);
            document.getElementById('canvasArea').appendChild(section);
        });

        // 2. 加载数据并渲染
        for (let i = 0; i < chars.length; i++) {
            const char = chars[i];
            try {
                const data = await HanziWriter.loadCharacterData(char);
                charDataArray.push({ char, data });

                // 渲染彩虹图 (target 0)
                const t0 = document.getElementById(`target_0_${i}`);
                t0.appendChild(createGridSvg(240));
                t0.appendChild(generateSvgGroup(data.strokes, data.medians, true));

                // 初始化动画 (target 1)
                const w = HanziWriter.create(`target_1_${i}`, char, {
                    width: 240, height: 240, padding: 20, showOutline: true,
                    strokeAnimationSpeed: 1.5, delayBetweenStrokes: 150
                });
                writers.push(w);

                // 渲染空心图 (target 2)
                const t2 = document.getElementById(`target_2_${i}`);
                t2.appendChild(createGridSvg(240));
                t2.appendChild(generateSvgGroup(data.strokes, null, false, null, true));

                // 词义展示（单个字展示简短翻译）
                getTranslation(char).then(m => {
                    for(let g=0; g<3; g++) {
                        const el = document.getElementById(`meaning_${g}_${i}`);
                        if(el) el.textContent = m;
                    }
                });

                // 部件拆解
                analyzeAndDisplayComponents(char, data, i);
                
            } catch (e) { console.error(e); }
        }

        // 启动动画循环
        isLooping = true;
        applyAnimColors();
        runInfiniteAnimation();

        // 3. 构建字帖
        buildWorksheet(chars, charDataArray);
        buildSentenceWorksheet(chars, charDataArray); // 【新增】构建句子预览
    }

    function createGridSvg(size = 380, color = "#e0e0e0", isBold = false) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
        let d = `M${size/2},0 V${size} M0,${size/2} H${size} M0,0 L${size},${size} M${size},0 L0,${size}`;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", d); p.setAttribute("stroke", color); 
        p.setAttribute("stroke-dasharray", isBold ? "" : "5,5"); 
        p.setAttribute("stroke-width", isBold ? "2" : "1");
        p.setAttribute("fill", "none");
        svg.appendChild(p);
        return svg;
    }

    function generateSvgGroup(strokes, medians, showNumber, colorOverride = null, isOutline = false, highlightIndex = null) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 1024 1024");
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("transform", TRANSFORM);
        if (isOutline) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", strokes.join(' '));
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", colorOverride || "#ccc");
            path.setAttribute("stroke-width", "10");
            path.setAttribute("stroke-dasharray", "20,10");
            g.appendChild(path);
        } else {
            strokes.forEach((pathData, i) => {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", pathData); 
                // 修复逻辑：如果是指定高亮某笔，其余设为透明
                if (highlightIndex !== null) {
                    p.setAttribute("fill", i === highlightIndex ? (colorOverride || COLORS[i % COLORS.length]) : "rgba(0,0,0,0)");
                } else {
                    p.setAttribute("fill", colorOverride || COLORS[i % COLORS.length]);
                }
                g.appendChild(p);
            });
        }
        if (showNumber && medians) {
            medians.forEach((median, i) => {
                if (median) {
                    const startPoint = median[0]; 
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", startPoint[0] - 30); text.setAttribute("y", startPoint[1] + 30);
                    text.setAttribute("class", "stroke-number");
                    text.setAttribute("transform", `scale(1, -1) translate(0, ${-startPoint[1] * 2})`);
                    text.textContent = i + 1;
                    g.appendChild(text);
                }
            });
        }
        svg.appendChild(g);
        return svg;
    }

    function generateSvgGroupColored(strokes, medians, showNumber, colorMap, startIndex = 0) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 1024 1024");
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("transform", TRANSFORM);
        strokes.forEach((pathData, i) => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", pathData);
            p.setAttribute("fill", colorMap[startIndex + i] || '#333');
            g.appendChild(p);
        });
        if (showNumber && medians) {
            medians.forEach((median, i) => {
                if (median) {
                    const startPoint = median[0];
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", startPoint[0] - 30); text.setAttribute("y", startPoint[1] + 30);
                    text.setAttribute("class", "stroke-number");
                    text.setAttribute("transform", `scale(1, -1) translate(0, ${-startPoint[1] * 2})`);
                    text.textContent = i + 1;
                    g.appendChild(text);
                }
            });
        }
        svg.appendChild(g);
        return svg;
    }

    function runInfiniteAnimation() {
        if (!isLooping || writers.length === 0) return;
        
        // 同时启动所有字的动画
        const promises = writers.map(w => {
            return new Promise(resolve => {
                w.animateCharacter({ onComplete: resolve });
            });
        });

        Promise.all(promises).then(() => {
            if (isLooping) {
                setTimeout(runInfiniteAnimation, 2000);
            }
        });
    }

    function showDownloadOptions(type) {
        currentDownloadType = type;
        document.getElementById('downloadModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('downloadModal').style.display = 'none';
    }

    // 修改：执行下载，如果是多字则打包合成
    async function executeDownload(mode) {
        closeModal();
        const inputText = document.getElementById('charInput').value;
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        
        const count = charDataArray.length;
        const showPinyin = (mode === 'full' || mode === 'pinyin');
        const showEnglish = (mode === 'full' || mode === 'english');
        const headerHeight = (showPinyin || showEnglish) ? 200 : 0;
        
        // 画布尺寸：横向排列所有字
        canvas.width = 1024 * count;
        canvas.height = 1024 + headerHeight;
        
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for(let i=0; i<count; i++) {
            const char = charDataArray[i].char;
            const data = charDataArray[i].data;
            
            // 拼音与翻译（由于是词组下载，上方显示全词拼音或单字拼音）
            if (showPinyin) {
                const py = mode === 'english' ? pinyinPro.pinyin(char, {toneType: 'none'}) : pinyinPro.pinyin(char);
                ctx.fillStyle = "#FF8C42";
                ctx.font = "bold 80px 'PingFang SC'";
                ctx.textAlign = "center";
                ctx.fillText(py, (i * 1024) + 512, 90);
            }

            let svg;
            if (currentDownloadType === 'main') {
                svg = generateSvgGroup(data.strokes, data.medians, true);
            } else {
                svg = generateSvgGroup(data.strokes, null, false, null, true);
            }
            await drawSvgToCanvas(svg, ctx, i * 1024, headerHeight, 1024);
        }

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png"); 
        link.download = `${inputText}_${currentDownloadType}.png`;
        link.click();
    }

    function drawSvgToCanvas(svg, ctx, x, y, size) {
        return new Promise(resolve => {
            const svgClone = svg.cloneNode(true);
            const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
            style.textContent = ".stroke-number { font-family: Arial; font-size: 80px; font-weight: 900; fill: black; stroke: white; stroke-width: 14px; paint-order: stroke; }";
            svgClone.insertBefore(style, svgClone.firstChild);
            const xml = new XMLSerializer().serializeToString(svgClone);
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, x, y, size, size); resolve(); };
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
        });
    }

    // 修改：支持词组部件展示
    function analyzeAndDisplayComponents(char, data, charIdx) {
        const root = document.getElementById('compDisplayRoot');
        const group = document.createElement('div');
        group.className = 'comp-group';
        group.innerHTML = `<div class="comp-group-title">「${char}」的部件：</div>`;
        
        const container = document.createElement('div');
        container.className = 'comp-display';
        
        const total = data.strokes.length;
        let comps = [];
        if (data.radStrokes) {
            const rad = data.radStrokes;
            const rest = Array.from({length:total}, (_,i)=>i).filter(i=>!rad.includes(i));
            comps.push({name:"部首", indices:rad, color:"#e74c3c"});
            if(rest.length) comps.push({name:"部件", indices:rest, color:"#3498db"});
        } else {
            comps.push({name:"全字", indices: Array.from({length:total}, (_,i)=>i), color:"#333"});
        }
        comps.forEach(c => {
            const box = document.createElement('div'); box.className = 'comp-item';
            box.appendChild(generateSvgGroup(c.indices.map(i=>data.strokes[i]), null, false, c.color));
            container.appendChild(box);
        });
        group.appendChild(container);
        root.appendChild(group);
        
        // 存储用于导出的部件信息
        charDataArray[charIdx].comps = comps;
    }

    function applyAnimColors() {
        if (writers.length === 0) return;
        writers.forEach((w, idx) => {
            const data = charDataArray[idx].data;
            if (currentAnimMode === 'component') {
                if (data.radStrokes && data.radStrokes.length > 0) {
                    const radSet = new Set(data.radStrokes);
                    data.strokes.forEach((_, i) => {
                        w.updateColor(`stroke${i}`, radSet.has(i) ? '#E74C3C' : '#3498DB');
                    });
                } else {
                    data.strokes.forEach((_, i) => {
                        w.updateColor(`stroke${i}`, i % 2 === 0 ? '#E74C3C' : '#3498DB');
                    });
                }
            } else {
                data.strokes.forEach((_, i) => {
                    w.updateColor(`stroke${i}`, COLORS[i % COLORS.length]);
                });
            }
        });
    }

    function setAnimMode(mode) {
        currentAnimMode = mode;
        document.getElementById('btnAnimRainbow').classList.toggle('active', mode === 'rainbow');
        document.getElementById('btnAnimComponent').classList.toggle('active', mode === 'component');
        applyAnimColors();
    }

    function setStrokeMode(mode) {
        currentStrokeMode = mode;
        document.getElementById('btnModeRainbow').classList.toggle('active', mode === 'rainbow');
        document.getElementById('btnModeComponent').classList.toggle('active', mode === 'component');
        if (charDataArray.length > 0) buildWorksheet(null, charDataArray);
    }

    function getComponentColorMap(data) {
        const map = {}; 
        if (data.radStrokes) {
            const rad = data.radStrokes;
            const allIdx = Array.from({length: data.strokes.length}, (_, i) => i);
            const rest = allIdx.filter(i => !rad.includes(i));
            const groups = [rad, rest].filter(g => g.length > 0);
            groups.forEach((group, gi) => {
                group.forEach(idx => { map[idx] = COMPONENT_COLORS[gi % COMPONENT_COLORS.length]; });
            });
        } else {
            data.strokes.forEach((_, i) => { map[i] = COMPONENT_COLORS[0]; });
        }
        return map;
    }

    // 修改：支持多字字帖构建
    function buildWorksheet(chars, dataArr) {
        const root = document.getElementById('worksheetRowsRoot');
        root.innerHTML = '';
        
        dataArr.forEach((item, idx) => {
            const char = item.char;
            const data = item.data;
            
            const charWrapper = document.createElement('div');
            charWrapper.style.marginBottom = "30px";
            charWrapper.innerHTML = `<div class="row-label"><i>汉字 ${idx+1}</i>：${char}</div>`;

            // 第一行：笔顺展示
            const row1 = document.createElement('div');
            row1.className = 'worksheet-row-wrapper';
            const row1Content = document.createElement('div');
            row1Content.className = 'worksheet-row';
            
            const total = data.strokes.length;
            const compColorMap = getComponentColorMap(data);
            for(let i = 1; i <= total; i++) {
                const cell = createCell();
                if (currentStrokeMode === 'component') {
                    const strokeSubset = data.strokes.slice(0, i);
                    cell.appendChild(generateSvgGroupColored(strokeSubset, null, false, compColorMap, 0));
                } else {
                    cell.appendChild(generateSvgGroup(data.strokes.slice(0, i), null, false, "#333"));
                }
                row1Content.appendChild(cell);
            }
            // 完整字（彩虹）
            const fullCell = createCell();
            fullCell.appendChild(generateSvgGroup(data.strokes, data.medians, true));
            row1Content.appendChild(fullCell);
            row1.appendChild(row1Content);

            // 第二行：临摹
            const row2 = document.createElement('div');
            row2.className = 'worksheet-row-wrapper';
            const row2Content = document.createElement('div');
            row2Content.className = 'worksheet-row';
            const practiceColors = ["#333", "#eee", "#eee", "#eee", "#eee", "#eee", "#eee"];
            for (let i = 0; i < 8; i++) {
                const cell = createCell();
                if (i < practiceColors.length) {
                    cell.appendChild(generateSvgGroup(data.strokes, null, false, practiceColors[i]));
                }
                row2Content.appendChild(cell);
            }
            row2.appendChild(row2Content);

            charWrapper.appendChild(row1);
            charWrapper.appendChild(row2);
            root.appendChild(charWrapper);
        });
    }

    // 【新增代码位置】构建句子练习纸的预览
    function buildSentenceWorksheet(chars, dataArr) {
        const root = document.getElementById('sentenceWorksheetRoot');
        root.innerHTML = `<div class="row-label">📝 句子练习纸预览 (Sentence Sheet Preview)</div>`;
        
        const wrapper = document.createElement('div');
        wrapper.className = 'worksheet-row-wrapper';
        const row = document.createElement('div');
        row.className = 'worksheet-row';
        row.id = "sentenceRowPreview";

        dataArr.forEach((item) => {
            const box = document.createElement('div');
            box.className = 'sentence-cell-box';
            
            const pinyinDiv = document.createElement('div');
            pinyinDiv.className = 'sentence-pinyin';
            pinyinDiv.textContent = pinyinPro.pinyin(item.char);
            
            const cell = createCell();
            cell.appendChild(generateSvgGroup(item.data.strokes, null, false, "#eee")); // 浅色临摹背景
            
            box.appendChild(pinyinDiv);
            box.appendChild(cell);
            row.appendChild(box);
        });
        
        wrapper.appendChild(row);
        root.appendChild(wrapper);
    }

    function createCell() {
        const cell = document.createElement('div');
        cell.className = 'worksheet-cell';
        cell.appendChild(createGridSvg(85, "#ccc"));
        return cell;
    }

    // 修复后的批量下载逻辑
    async function downloadAllStrokes() {
        const inputText = document.getElementById('charInput').value;
        for(const item of charDataArray) {
            const char = item.char;
            const allStrokes = item.data.strokes;
            for(let i=0; i<allStrokes.length; i++) {
                // 修改点：传入完整的 allStrokes，但指定当前高亮索引 i。
                // 这样能保持 SVG 的 Bounds/视口一致，防止浏览器渲染丢失。
                const svg = generateSvgGroup(allStrokes, null, false, COLORS[i % COLORS.length], false, i);
                await exportSingleSvg(svg, `${char}_第${i+1}笔.png`, 'none', true);
                await new Promise(r => setTimeout(r, 200));
            }
        }
    }

    // 修改：支持批量下载所有部件
    async function downloadComponents() {
        for(const item of charDataArray) {
            const char = item.char;
            for(const c of item.comps) {
                const svg = generateSvgGroup(c.indices.map(idx=>item.data.strokes[idx]), null, false, c.color);
                await exportSingleSvg(svg, `${char}_${c.name}.png`, 'none', true);
                await new Promise(r => setTimeout(r, 200));
            }
        }
    }

    // 辅助导出函数
    async function exportSingleSvg(svg, filename, mode = 'none', transparent = false) {
        return new Promise(resolve => {
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 1024;
            ctx.clearRect(0, 0, 1024, 1024);
            if (!transparent) { ctx.fillStyle = "white"; ctx.fillRect(0, 0, 1024, 1024); }
            drawSvgToCanvas(svg, ctx, 0, 0, 1024).then(() => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png"); 
                link.download = filename;
                link.click(); 
                resolve();
            });
        });
    }

    // 修改：字帖下载支持长词组
    async function downloadWorksheet() {
        const inputText = document.getElementById('charInput').value || '字';
        const cellSize = 400; const padding = 40;
        const sheetCanvas = document.getElementById('sheetCanvas');
        const ctx = sheetCanvas.getContext('2d');
        
        // 计算最大宽度
        let maxCols = 0;
        const wrappers = document.querySelectorAll('.worksheet-row');
        wrappers.forEach(w => { if(w.children.length > maxCols) maxCols = w.children.length; });

        sheetCanvas.width = cellSize * maxCols; 
        sheetCanvas.height = (cellSize * 2 + padding * 2) * charDataArray.length;
        
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, sheetCanvas.width, sheetCanvas.height);
        
        const rows = document.querySelectorAll('.worksheet-row');
        for(let i=0; i<rows.length; i++) {
            const cells = rows[i].children;
            if (cells[0] && cells[0].classList.contains('sentence-cell-box')) continue; // 跳过句子预览行

            const yOffset = Math.floor(i/2) * (cellSize * 2 + padding * 2) + (i % 2 === 1 ? cellSize + padding : 0);
            
            for(let j=0; j<cells.length; j++) {
                const svgs = cells[j].querySelectorAll('svg');
                if(svgs[0]) await drawSvgToCanvas(svgs[0], ctx, j * cellSize, yOffset, cellSize);
                if(svgs[1]) await drawSvgToCanvas(svgs[1], ctx, j * cellSize, yOffset, cellSize);
                ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(j * cellSize, yOffset, cellSize, cellSize);
            }
        }
        
        const link = document.createElement('a'); 
        link.download = `${inputText}_全词双行练习帖.png`; 
        link.href = sheetCanvas.toDataURL("image/png"); 
        link.click();
    }

    // 【新增代码位置】句子导出的具体逻辑函数
    async function downloadSentenceWorksheet() {
        const inputText = document.getElementById('charInput').value || '句子';
        const cellSize = 400; 
        const pinyinHeight = 120;
        const sheetCanvas = document.getElementById('sheetCanvas');
        const ctx = sheetCanvas.getContext('2d');
        
        const count = charDataArray.length;
        sheetCanvas.width = cellSize * count;
        sheetCanvas.height = cellSize + pinyinHeight;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, sheetCanvas.width, sheetCanvas.height);

        for(let i=0; i<count; i++) {
            const item = charDataArray[i];
            const x = i * cellSize;

            // 1. 绘制拼音
            ctx.fillStyle = "#FF8C42";
            ctx.font = "bold 60px 'PingFang SC'";
            ctx.textAlign = "center";
            ctx.fillText(pinyinPro.pinyin(item.char), x + cellSize/2, 80);

            // 2. 绘制田字格背景
            const gridSvg = createGridSvg(cellSize, "#ccc");
            await drawSvgToCanvas(gridSvg, ctx, x, pinyinHeight, cellSize);

            // 3. 绘制浅色字(临摹用)
            const charSvg = generateSvgGroup(item.data.strokes, null, false, "#eee");
            await drawSvgToCanvas(charSvg, ctx, x, pinyinHeight, cellSize);

            // 4. 绘制边框
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.strokeRect(x, pinyinHeight, cellSize, cellSize);
        }

        const link = document.createElement('a'); 
        link.download = `${inputText}_句子书写练习纸.png`; 
        link.href = sheetCanvas.toDataURL("image/png"); 
        link.click();
    }

    window.onload = initAll;
</script>
